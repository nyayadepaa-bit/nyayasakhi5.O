version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: NyayaDepaaAI_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ─────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/NyayaDepaaAI_auth"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: "717d633a27dde74c64967d38711a9fce"
      ADMIN_EMAIL: "nyayadepaa@gmail.com"
      ADMIN_PASSWORD: "Adminlogin@12345678"
      ADMIN_NAME: "System Admin"
      SMTP_HOST: "smtp.resend.com"
      SMTP_PORT: "587"
      SMTP_USER: "resend"
      SMTP_PASSWORD: "re_HBKHkANE_9ALyWLbW4zs3Z5VEFpk2qmNc"
      FRONTEND_URL: "http://localhost"
      DEV_MODE: "false"

  # ── React Frontend (nginx) ─────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
