services:
  - type: web
    name: nyayadepaaai-api
    env: python
    buildCommand: "cd auth_app/backend && pip install -r requirements.txt"
    startCommand: "cd auth_app/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
